<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Video Dubber</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen flex flex-col items-center p-8">

    <header class="text-center mb-10">
        <h1 class="text-4xl font-bold text-blue-500">AI Video Dub</h1>
        <p class="text-gray-400">Clone voices & dub videos up to 10 minutes</p>
    </header>

    <main class="w-full max-w-2xl bg-gray-800 p-6 rounded-xl shadow-2xl">
        <!-- Upload Section -->
        <div id="upload-section" class="border-2 border-dashed border-gray-600 rounded-lg p-10 text-center hover:border-blue-500 transition">
            <input type="file" id="videoInput" accept="video/*" class="hidden">
            <label for="videoInput" class="cursor-pointer">
                <svg class="mx-auto h-12 w-12 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
                </svg>
                <p class="mt-2 text-lg">Click to upload video (Max 10 min)</p>
            </label>
        </div>

        <!-- Preview Section -->
        <div id="preview-section" class="hidden mt-6">
            <video id="mainVideo" controls class="w-full rounded-lg shadow-lg mb-4"></video>
            
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm mb-1">Target Language</label>
                    <select id="targetLang" class="w-full bg-gray-700 p-2 rounded">
                        <option value="es">Spanish</option>
                        <option value="fr">French</option>
                        <option value="de">German</option>
                        <option value="hi">Hindi</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm mb-1">Voice Similarity</label>
                    <select id="simLevel" class="w-full bg-gray-700 p-2 rounded">
                        <option value="high">High Similarity (Clone)</option>
                        <option value="med">Natural Blend</option>
                    </select>
                </div>
            </div>

            <button id="dubBtn" class="w-full mt-6 bg-blue-600 hover:bg-blue-700 py-3 rounded-lg font-bold transition">
                Start Dubbing (Real-time Progress)
            </button>
        </div>

        <!-- Progress/Result Section -->
        <div id="status" class="hidden mt-6 text-center">
            <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-blue-500 mx-auto mb-4"></div>
            <p id="statusText">Processing your 10-minute video...</p>
        </div>

        <div id="download-section" class="hidden mt-6">
            <a id="downloadBtn" href="#" download class="block w-full text-center bg-green-600 hover:bg-green-700 py-3 rounded-lg font-bold transition">
                Download Dubbed Video
            </a>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
